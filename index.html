<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MOSEF Holdings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0B3D2E;
      color: white;
      text-align: center;
    }
    header {
      padding: 60px 20px 30px;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 18px;
      opacity: 0.8;
    }
    .since {
      margin-top: 5px;
      font-size: 14px;
      opacity: 0.6;
    }
    .companies {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 40px 20px;
      max-width: 600px;
      margin: auto;
    }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }
    .card:hover {
      background: rgba(255,255,255,0.2);
    }
    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<header>
  <h1>MOSEF Holdings</h1>
  <div class="tagline">Organic Sustainable Ecological Farms</div>
  <div class="since">Since 1953</div>
</header>

<section class="companies">
  <a href="#" class="card">Poultry Division</a>
  <a href="#" class="card">Saffron & Mycology</a>
  <a href="#" class="card">Sheep Genetics</a>
  <a href="#" class="card">MOSEF Property Ltd</a>
</section>

<footer>
  © 2026 MOSEF Holdings. All rights reserved.
</footer>

</body>
</html>
